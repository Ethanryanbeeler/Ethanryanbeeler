<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">

<stop offset="0%" stop-color="#00A8FF" stop-opacity="0.8"></stop>

<stop offset="100%" stop-color="#0066FF" stop-opacity="0"></stop>

</linearGradient>


<filter id="blur">

<feGaussianBlur stdDeviation="40"></feGaussianBlur>

</filter>

</defs>


<!-- Large angled shapes -->

<polygon points="0,100 500,0 650,300 100,500" fill="url(#blueGlow)" opacity="0.35"></polygon>


<polygon points="1200,0 1600,200 1600,700 1300,500" fill="url(#blueGlow)" opacity="0.25"></polygon>


<polygon points="300,900 900,650 1200,900" fill="#008CFF" opacity="0.12"></polygon>



<!-- Floating diamonds -->

<g opacity="0.4">

<rect x="250" y="200" width="90" height="90" transform="rotate(45 250 200)" fill="#ffffff"></rect>


<rect x="1250" y="300" width="120" height="120" transform="rotate(45 1250 300)" fill="#ffffff"></rect>


<rect x="700" y="700" width="70" height="70" transform="rotate(45 700 700)" fill="#ffffff"></rect>

</g>



<!-- Light streak -->

<path d="M0 700 L1600 250" stroke="#4DC8FF" stroke-width="3" opacity="0.3"></path>


</svg>